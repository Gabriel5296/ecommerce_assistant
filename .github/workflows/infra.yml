name: Provision Infra (EKS + ECR)

on:
  workflow_dispatch:   # manual trigger only

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Delete stack if in ROLLBACK_COMPLETE state
      - name: Cleanup failed stack if needed
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name product-assistant-cluster --region ${{ secrets.AWS_REGION }} --query "Stacks[0].StackStatus" --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack in ROLLBACK_COMPLETE — deleting before redeploy..."
            aws cloudformation delete-stack --stack-name product-assistant-cluster --region ${{ secrets.AWS_REGION }}
            aws cloudformation wait stack-delete-complete --stack-name product-assistant-cluster --region ${{ secrets.AWS_REGION }}
            echo "Stack deleted."
          fi

      # Deploy CloudFormation Stack
      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --stack-name product-assistant-cluster \
            --template-file infra/eks-with-ecr.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region ${{ secrets.AWS_REGION }} \
            --parameter-overrides NodeInstanceType=t3.small DesiredCapacity=1
